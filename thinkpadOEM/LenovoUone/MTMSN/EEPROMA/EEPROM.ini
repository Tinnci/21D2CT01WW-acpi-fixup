;This file is EEPROM configuration file
;Digital only accept decimal and hexadecimal
;Section "EEPROM STRUCTURE" is used to set the structure size and the software SMI.
;Size              default : 4096 (Bytes)
;SwSmi             default : 0
[EEPROM STRUCTURE]
Size=4096
SwSmi=0xC0

;Other Section is used to set the tool commands.
;Every Section only can set one rcommand(Read), and wcommand(Write).
;Type byte, word, dword, qword support multiparameter.
;Offset     : The EEPROM data offset.
;length     : The size of the data.
;rcommand   : The command set for read data.
;wcommand   : The command set for write data.
;type       : The type of the command. (Only accept byte, word, dword, qword, astring, ustring, GUID)
; - byte    : The command data is a byte array.
; - word    : The command data is a word array.
; - dword   : The command data is a dword array.
; - qword   : The command data is a qword array.
; - astring : The command data is a character array string.
; - ustring : The command data is a wide character array string.
; - GUID    : The command data is a Globally Unique Identifier. format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
;For Example:
;1. Set four command to initial the tools
;
[Product Name]
Offset = 0x00
length = 0x41
rcommand = /rpn
wcommand = /wpn
type=astring
;
[Serial Number]
Offset=0x60
length=0x21
rcommand=/rsn
wcommand=/wsn
type=astring
;
[UUID]
Offset=0x90
length=0x10
rcommand=/ruu
wcommand=/wuu
type=guid
;
[ProjectName]
Offset=0xA0
length=0x41
rcommand=/rpr
wcommand=/wpr
type=astring
;
[KBID]
Offset=0xF0
length=0x01
rcommand=/rkb
wcommand=/wkb
type=byte
;
[BTID]
Offset=0xF1
length=0x01
rcommand=/rbt
wcommand=/wbt
type=byte
;
[EPAF]
