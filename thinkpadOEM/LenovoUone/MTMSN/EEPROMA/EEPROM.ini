length=0x01
rcommand=/rel
wcommand=/wel
type=byte
;
[FunctionFlag]
Offset=0xF3
length=0x01
rcommand=/rfl
wcommand=/wfl
type=byte
;
[Customer]
Offset=0xF4
length=0x01
rcommand=/rcs
wcommand=/wcs
type=byte
;
[Family]
Offset=0x100
length=0x41
rcommand=/rf
wcommand=/wf
type=astring
;
[AssetFlag]
Offset=0x150
length=0x11
rcommand=/rAss
wcommand=/wAss
type=astring
;
[OSPN]
Offset=0x170
length=0x11
rcommand=/rospn
wcommand=/wospn
type=astring
;
[OSDES]
Offset=0x190
length=0x21
rcommand=/rOSD
wcommand=/wOSD
type=astring
;
[MTM]
Offset=0x1C0
length=0x41
rcommand=/rmtm
wcommand=/wmtm
type=astring
;
[OA3KEYID]
Offset=0x210
length=0x21
rcommand=/roa
wcommand=/woa
type=astring
;
[BOOTS]
Offset=0x50
length=0x01
rcommand=/rBS
wcommand=/wBS
type=byte
;
[SecureBoot]
Offset=0x51
length=0x01
rcommand=/rSB
wcommand=/wSB
type=byte
;
[FreeDOS]
Offset=0x52
length=0x01
rcommand=/rfo
wcommand=/wfo
type=byte
;
[XiaoXin]
